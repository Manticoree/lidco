# ─────────────────────────────────────────────────────────────────────────────
# LIDCO — Z.AI Coding Plan (Lite, ~120 промптов / 5 часов)
# ─────────────────────────────────────────────────────────────────────────────
#
# Этот файл — главный конфиг моделей. Лежит в корне проекта для удобства.
# Приоритет загрузки (последний побеждает):
#   1. configs/llm_providers.yaml        (дефолты пакета)
#   2. ~/.lidco/llm_providers.yaml       (глобальные настройки)
#   3. .lidco/llm_providers.yaml         (папка проекта)
#   4. llm_providers.yaml                (КОРЕНЬ ПРОЕКТА — этот файл)
#
# API-ключ берётся из .env:  ZAI_API_KEY=ваш_ключ
#
# Доступные модели:
#   GLM-4.7       — основная модель, 200K контекст
#
# ─────────────────────────────────────────────────────────────────────────────


# ── Провайдеры ──────────────────────────────────────────────────────────────

providers:
  # Coding Plan — запросы тратят квоту подписки
  zai-coding:
    api_base: "https://api.z.ai/api/coding/paas/v4"
    api_key: "${ZAI_API_KEY}"
    models:
      - openai/glm-4.7


# ── Модели по ролям ─────────────────────────────────────────────────────────

role_models:
  default:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1

  routing:
    model: "openai/glm-4.7"
    temperature: 0.0
    max_tokens: 50

  completion:
    model: "openai/glm-4.7"
    temperature: 0.0
    max_tokens: 256

  coder:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1
    max_tokens: 4096

  reviewer:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.0

  planner:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1

  architect:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1

  debugger:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.0

  refactor:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1

  tester:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.1

  docs:
    model: "openai/glm-4.7"
    fallback: "openai/glm-4.7"
    temperature: 0.3
